<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FitTrack - Dein Workout Tracker</title>
    <meta name="description"
        content="Einfacher Workout Tracker zum Protokollieren von Übungen, Sets, Reps und Gewicht.">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#FF6B4A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FitTrack">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <span class="logo">🏋️</span>
                <h1 class="app-title">FitTrack</h1>
            </div>
            <nav class="header-nav">
                <button class="nav-btn active" data-view="week" id="nav-week">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </button>
                <button class="nav-btn" data-view="exercises" id="nav-exercises">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                </button>
                <button class="nav-btn" data-view="stats" id="nav-stats">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"></line>
                        <line x1="12" y1="20" x2="12" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="14"></line>
                    </svg>
                </button>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Week View -->
            <section id="week-view" class="view active">
                <div class="week-navigation">
                    <button class="week-nav-btn" id="prev-week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <h2 class="week-title" id="week-title">Januar 2026 - Woche 3</h2>
                    <button class="week-nav-btn" id="next-week">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>

                <div class="week-calendar" id="week-calendar">
                    <!-- Days will be rendered by JavaScript -->
                </div>

                <div class="day-workout" id="day-workout">
                    <div class="day-header">
                        <h3 class="day-title" id="day-title">Mittwoch, 15. Januar</h3>
                    </div>

                    <div class="exercises-list" id="exercises-list">
                        <!-- Exercises will be rendered by JavaScript -->
                    </div>

                    <button class="add-exercise-btn" id="add-exercise-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        Übung hinzufügen
                    </button>
                </div>
            </section>

            <!-- Exercises Database View -->
            <section id="exercises-view" class="view">
                <h2 class="section-title">Meine Übungen</h2>

                <div class="exercises-database-list" id="exercises-database-list">
                    <!-- Exercises will be rendered by JavaScript -->
                </div>

                <button class="add-exercise-btn" id="add-db-exercise-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Übung zur Datenbank hinzufügen
                </button>
            </section>

            <!-- Stats View -->
            <section id="stats-view" class="view">
                <h2 class="section-title">Statistiken</h2>

                <!-- Muscle Group Stats -->
                <div class="muscle-stats-section">
                    <h3 class="subsection-title">Sets pro Muskelgruppe</h3>
                    <div class="muscle-stats-list" id="muscle-stats-list">
                        <!-- Muscle group stats will be rendered by JavaScript -->
                    </div>
                </div>

                <div class="stats-grid" id="stats-grid">
                    <!-- Stats cards will be rendered by JavaScript -->
                </div>

                <div class="recent-workouts">
                    <h3 class="subsection-title">Letzte Workouts</h3>
                    <div class="workouts-list" id="recent-workouts-list">
                        <!-- Recent workouts will be rendered by JavaScript -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Exercise Modal (for workout tracking) -->
    <div class="modal-overlay" id="exercise-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Übung hinzufügen</h3>
                <button class="modal-close" id="modal-close">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="exercise-name">Übungsname</label>
                    <input type="text" id="exercise-name" placeholder="z.B. Bench Press" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="exercise-muscle">Muskelgruppe</label>
                    <select id="exercise-muscle" class="form-select">
                        <option value="">-- Auswählen --</option>
                        <option value="Brust">Brust</option>
                        <option value="Rücken">Rücken</option>
                        <option value="Schultern">Schultern</option>
                        <option value="Bizeps">Bizeps</option>
                        <option value="Trizeps">Trizeps</option>
                        <option value="Beine">Beine</option>
                        <option value="Core">Core</option>
                        <option value="Andere">Andere</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modal-cancel">Abbrechen</button>
                <button class="btn btn-primary" id="modal-save">Speichern</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
